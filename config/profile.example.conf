
# vision_app example profile
mode=calibrate
profile_path=config/profile.conf

device=/dev/video0
width=160
height=120
fps=120
fourcc=MJPG
buffer_size=1
latest_only=1
drain_grabs=1
ui=1
draw_overlay=1
duration=10

camera_preview_max=800
warp_preview_max=900
status_width=720
show_status_window=1
text_sink=split

warp_width=384
warp_height=384
target_tag_px=128

tag_family=auto
target_id=0
require_target_id=1
manual_lock_only=1
lock_frames=4

save_warp=report/warp_package.yml.gz
load_warp=report/warp_package.yml.gz
save_rois=report/rois.yml
load_rois=report/rois.yml
save_report=report/latest_report.md

trigger_mode=fixed_rect
red_roi=0.08,0.08,0.18,0.18
image_roi=0.32,0.10,0.50,0.55
red_ratio_threshold=0.18

upper_band=0.24,0.08
lower_band=0.44,0.08
min_red_width_ratio=0.18
min_red_fill_ratio=0.12
x_smoothing_alpha=0.35
image_bottom_offset=0.05
dynamic_image_width=0.32
dynamic_image_height=0.32

red_h1_low=0
red_h1_high=10
red_h2_low=170
red_h2_high=180
red_s_min=80
red_v_min=60

model_enable=0
model_backend=ncnn
model_ncnn_param_path=models/model.ncnn.param
model_ncnn_bin_path=models/model.ncnn.bin
model_labels_path=models/labels.txt
model_input_width=128
model_input_height=128
model_preprocess=crop
model_threads=4
model_stride=1
model_topk=5
model_max_hz=5.0

run_red=1
run_image_roi=1
run_model=1
save_image_roi_dir=
save_red_roi_dir=
save_every_n=0

automation_enable=0
automation_mode=demo
automation_server_url=http://127.0.0.1:8787
automation_session=default
automation_collect_dir=report/automation
automation_poll_ms=250
automation_settle_ms=700
automation_max_per_trial=1
automation_wrong_only=1
automation_low_conf_threshold=0.65
