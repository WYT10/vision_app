# Core mode: probe | bench | live | deploy
mode=live

# Camera
device=/dev/video0
width=1280
height=720
fps=30
fourcc=MJPG
buffer_size=1
latest_only=1
drain_grabs=2
warmup_frames=8
duration_sec=10
preview=1
headless=0

# AprilTag
# tag_family: auto | 16 | 25 | 36
tag_family=auto
target_id=0
require_target_id=1
manual_lock_only=1
lock_frames=8
max_center_jitter_px=3.0
max_corner_jitter_px=4.0
min_quad_area_ratio=0.0025

# Warp behavior
# warp_width / warp_height define the target tag rectangle before the app computes
# the full-view warped preview bounding box.
warp_width=720
warp_height=720
warp_view_max_side=900
interactive_max_side=1000
unsafe_big_frame=0

# Runtime behavior
auto_save_lock=1
live_preview_raw=1
live_preview_warp=1
show_help_overlay=1
show_status_overlay=1
use_remap_cache=1
fixed_point_remap=1
save_remap_cache=1
save_snapshots=1
snapshot_dir=../report

# ROI editor
move_step=0.005
size_step=0.005
red_roi=0.05,0.10,0.20,0.20
image_roi=0.30,0.10,0.50,0.60

# Red gate -> image roi -> infer stub path
red_mean_threshold=120
red_dominance_threshold=20
trigger_cooldown_frames=10
save_triggered_image_roi=1

# Output files
save_probe_csv=../report/probe_table.csv
save_test_csv=../report/test_results.csv
save_report_md=../report/latest_report.md
save_h_path=../report/warp_h.json
save_rois_path=../report/rois.json
save_remap_path=../report/warp_remap.yml.gz
load_h_path=../report/warp_h.json
load_rois_path=../report/rois.json
load_remap_path=../report/warp_remap.yml.gz
