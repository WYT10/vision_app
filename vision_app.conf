# Core mode: probe | bench | live | deploy
mode=live

# Camera
device=/dev/video0
width=1280
height=720
fps=30
fourcc=MJPG
buffer_size=1
latest_only=1
drain_grabs=2
warmup_frames=8
duration_sec=0
preview=1
headless=0

# AprilTag
# family: auto | 16 | 25 | 36
# auto searches 36 -> 25 -> 16 and chooses the best visible tag.
tag_family=auto
target_id=0
require_target_id=1
manual_lock_only=0
lock_frames=8
max_center_jitter_px=3.0
max_corner_jitter_px=4.0
min_quad_area_ratio=0.0025
threads=2
decimate=1.0
blur_sigma=0.0
refine_edges=1

# Warp output
warp_width=1280
warp_height=720

# ROI setup in warped space; ratio x,y,w,h
red_roi=0.05,0.10,0.20,0.20
image_roi=0.30,0.10,0.50,0.60
move_step=0.005
size_step=0.005

# UI / preview
live_preview_raw=1
live_preview_warp=1
show_roi_crops=1
show_help_overlay=1
show_status_overlay=1
save_snapshots=0
snapshot_dir=../report

# Output files (paths assume running from build/)
save_probe_csv=../report/probe_table.csv
save_test_csv=../report/test_results.csv
save_report_md=../report/latest_report.md
save_h_path=../report/warp_h.json
save_rois_path=../report/rois.json
load_h_path=
load_rois_path=
auto_load_h=0
auto_load_rois=0
auto_save_lock=1
