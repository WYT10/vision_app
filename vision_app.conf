# Core mode: probe | bench | live | deploy
mode=live

# Camera
device=/dev/video0
width=1280
height=720
fps=30
fourcc=MJPG
buffer_size=1
latest_only=1
drain_grabs=2
warmup_frames=8
duration_sec=0
preview=1
headless=0

# AprilTag
# Needs OpenCV aruco/contrib or swap in another AprilTag backend.
# tag_family accepted values:
#   auto           – scan all families, pick the largest detected tag
#   tag36h11 (36)  – Tag36h11, default; most robust, good distance range
#   tag25h9  (25)  – Tag25h9;  smaller payload, slightly faster decode
#   tag16h5  (16)  – Tag16h5;  fewest bits, fastest decode, shortest range
#   tag36h10       – Tag36h10; legacy family
tag_family=tag36h11
target_id=0
require_target_id=1
lock_frames=8
max_center_jitter_px=3.0
max_corner_jitter_px=4.0
min_quad_area_ratio=0.0025

# Warp output
warp_width=1280
warp_height=720

# ROIs are ratio x,y,w,h in warped space
red_roi=0.05,0.10,0.20,0.20
image_roi=0.30,0.10,0.50,0.60

# Output files (paths assume running from build/)
save_probe_csv=../report/probe_table.csv
save_test_csv=../report/test_results.csv
save_report_md=../report/latest_report.md
save_h_path=../report/warp_h.json
save_rois_path=../report/rois.json
load_h_path=
load_rois_path=
auto_load_h=0
auto_load_rois=0
