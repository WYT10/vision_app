mode=probe

device=/dev/video0
width=640
height=480
fps=120
fourcc=MJPG
buffer_size=1
latest_only=1
drain_grabs=1
headless=0
duration=10

# live / deploy safety
camera_soft_max=1000
warp_soft_max=700
preview_soft_max=500
temp_preview_square=220
temp_preview_stride=3

# apriltag / aruco
# auto | 16 | 25 | 36
tag_family=auto
target_id=0
require_target_id=1
manual_lock_only=1
lock_frames=4

# outputs
save_warp=../report/warp_package.yml.gz
save_rois=../report/rois.yml
save_report=../report/latest_report.md

# ratio rois in warped image
red_roi=0.08,0.08,0.18,0.18
image_roi=0.32,0.10,0.50,0.55
