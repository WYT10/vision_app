# completed detailed v2 sample config
mode=calibrate
probe_task=list
roi_mode=dynamic_red_stacked

device=/dev/video0
width=160
height=120
fps=120
fourcc=MJPG
buffer_size=1
latest_only=1
drain_grabs=1
ui=1
draw_overlay=1
text_console=1
red_show_mask_window=1
duration=10
snap_path=../report/snap.jpg

camera_soft_max=1000
camera_preview_max=800
warp_preview_max=900

warp_width=384
warp_height=384
target_tag_px=128
warp_center_x_ratio=0.50
warp_center_y_ratio=0.42

tag_family=auto
target_id=0
require_target_id=1
manual_lock_only=1
lock_frames=4

save_warp=../report/warp_package.yml.gz
load_warp=../report/warp_package.yml.gz
save_rois=../report/rois.yml
load_rois=../report/rois.yml
save_report=../report/latest_report.md

red_roi=0.08,0.08,0.18,0.18
image_roi=0.32,0.10,0.50,0.55

red_h1_low=0
red_h1_high=10
red_h2_low=170
red_h2_high=180
red_s_min=80
red_v_min=60
red_morph_k=3

# dynamic stacked trigger
dyn_search_x0=0
dyn_search_x1=-1
dyn_upper_y0=110
dyn_upper_y1=135
dyn_lower_y0=145
dyn_lower_y1=175
dyn_zone_min_pixels=24
dyn_zone_min_ratio=0.015
dyn_center_x_max_diff=28
dyn_stable_frames_required=2
dyn_roi_width=96
dyn_roi_height=96
dyn_roi_gap_above_upper_zone=0

model_enable=0
model_backend=ncnn
model_ncnn_param_path=../models/model.ncnn.param
model_ncnn_bin_path=../models/model.ncnn.bin
model_labels_path=../models/labels.txt
model_input_width=128
model_input_height=128
model_preprocess=crop
model_threads=4
model_stride=1
model_topk=5
model_max_hz=5.0

run_red=1
run_image_roi=1
run_model=0
save_image_roi_dir=../captures/image_roi
save_red_roi_dir=../captures/red_band
save_every_n=0
