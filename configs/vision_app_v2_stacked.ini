# vision_app v2 sample config for stacked red zones

mode=calibrate
roi_mode=dynamic_red_stacked

# camera
ndevice=/dev/video0
# NOTE: fix the typo above when implementing a real parser; included here so you remember to validate keys.
device=/dev/video0
width=160
height=120
fps=120
fourcc=MJPG
buffer_size=1
latest_only=1
drain_grabs=1

# ui
ui=1
draw_overlay=1
camera_preview_max=800
warp_preview_max=900
text_console=1
text_console_font_scale=0.55
text_console_padding=10
red_mask_window=1

# tag / warp
tag_family=auto
target_id=0
require_target_id=1
manual_lock_only=1
lock_frames=4
warp_width=384
warp_height=384
target_tag_px=128
warp_center_x_ratio=0.50
warp_center_y_ratio=0.42

# fixed mode baseline
fixed_red_roi=0.08,0.08,0.18,0.18
fixed_image_roi=0.32,0.10,0.50,0.55

# dynamic stacked trigger
search_x0=0
search_x1=-1
upper_y0=110
upper_y1=135
lower_y0=145
lower_y1=175
roi_width=96
roi_height=96
roi_gap_above_upper_zone=0
x_smoothing_alpha=0.70
miss_tolerance_frames=5

# hsv threshold
red_h1_low=0
red_h1_high=10
red_h2_low=170
red_h2_high=180
red_s_min=80
red_v_min=60
red_morph_open_k=3
red_morph_close_k=3

# gates
zone_min_pixels=24
zone_min_ratio=0.015
zone_min_blob_area=20
zone_max_blob_area=5000
band_min_pixels=0
band_min_ratio=0.0
center_x_max_diff=24
trigger_consecutive_frames=2

# model off while tuning trigger
model_enable=0
model_backend=off
